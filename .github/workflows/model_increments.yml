name: Youtube Pipeline

on:
  schedule:
    - cron: "0 6 * * *" # Every day at 06:00 UTC
  workflow_dispatch: # Allows manual run from the Actions tab
    inputs:
      full_refresh:
        description: 'Run full refresh'
        required: false
        default: 'false'
        type: choice 
        options:
          - 'false'
          - 'true'

jobs:
  run_yt_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4" # or your preferred version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dbt dependencies
        run: | 
          dbt deps --project-dir data_pipeline/data_pipeline

      # -----------------------
      # STAGE (Python Pipeline)
      # -----------------------
      - name: Run stage pipeline
        env:
          DBL_URL: ${{ secrets.NEON_DBL_URL }}
          YI_API_KEY: ${{ secrets.YI_API_KEY }}
          CHANNEL_KEY: ${{ secrets.CHANNEL_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          MODE='${{ github.event.inputs.full_refresh || 'false'}}'
          
          if ['$MODE' = 'true']; then
            echo 'RUNNING STAGE FULL REFRESH'
            python data_preprocessing/run.py --mode truncate
          else 
            echo 'RUNNING STAGE FULL INCREMENTAL'
          python data_preprocessing/run.py --mode append
          fi

      # -----------------------
      # RDV (DBT Models)
      # -----------------------
      - name: Run DBT RDV models
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          MODE='${{ github.event.inputs.full_refresh || 'false'}}'
          
          if ['$MODE' = 'true']; then
            echo 'RUNNING RDV FULL REFRESH'
            dbt run --project-dir data_pipeline/data_pipeline --profiles-dir data_pipeline/data_pipeline --select rdv --full-refresh
          else 
            echo 'RUNNING RDV FULL INCREMENTAL'
            dbt run --project-dir data_pipeline/data_pipeline --profiles-dir data_pipeline/data_pipeline --select rdv
          fi
